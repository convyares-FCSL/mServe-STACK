services:
  robot-mserve:
    build:
      context: .
      dockerfile: Dockerfile
    image: mserve-robot:jazzy
    container_name: mserve-robot-mserve
    env_file:
      - .env
    environment:
      ROS_DOMAIN_ID: "${MSERVE_ROS_DOMAIN_ID:-52}"
      RCUTILS_LOGGING_SEVERITY: "${MSERVE_LOG_LEVEL:-INFO}"
    labels:
      logging: promtail
      robot: mserve
    volumes:
      - ./ws:/ws
      - ./web:/web
      # mserve_slam.launch.py sets slam_toolbox's cwd to
      # os.path.expanduser('~/mServe-STACK/map') unconditionally (native and
      # Docker alike) so save_map/serialize_map resolve a bare name with no
      # path typing — see map/README.md. Container's $HOME is /root, not
      # /home/ecm, so that path only exists here via this mount.
      - ./map:/root/mServe-STACK/map
      # USB webcam (mserve_camera) / RPLIDAR C1 (mserve_lidar) — optional
      # peripherals that can be unplugged. Bind-mounted rather than listed
      # under `devices:` below, because `devices:` resolves each host path
      # to a specific major:minor ONCE, at container-CREATE time, and if
      # that path doesn't exist at that moment `docker compose up` fails
      # outright — for the *entire* container, not just the one missing
      # device (confirmed the hard way: an unplugged RPLIDAR crash-looped
      # the whole systemd service, taking drivechain/base/camera/display
      # down with it, none of which even depend on the lidar). A bind-mount
      # has no such eager check and stays live afterwards — a device that
      # appears or disappears after container start is reflected
      # immediately, no `--force-recreate` needed (this also fixes the
      # earlier by-id staleness problem, not just the startup failure).
      #
      # Mounted at /dev/host, not at /dev/v4l or /dev/serial directly: the
      # by-id/by-path entries under those directories are symlinks with
      # *relative* targets (e.g. `../../video0`), which point outside
      # /dev/v4l itself, into plain /dev. Bind-mounting only /dev/v4l left
      # those symlinks dangling in the container's mount namespace (by-id
      # path visible via `ls`, but open() failed ENOENT — caught this the
      # hard way on first test with the lidar unplugged: the camera, which
      # *was* physically present, failed to open too). Mounting the whole
      # host /dev at a side path means every by-id symlink's relative target
      # resolves inside that same mounted tree. mserve_params.yaml's
      # mserve_camera.device / mserve_lidar.device point at
      # /dev/host/v4l/by-id/... and /dev/host/serial/by-id/... accordingly.
      #
      # Doesn't shadow the container's own /dev (that stays exactly as
      # Docker set it up, including its real /dev/shm tmpfs for DDS shared
      # memory) — /dev/host is a distinct, additional path, so the
      # full-/dev-mount-breaks-DDS problem from an earlier attempt (mounting
      # host /dev directly onto the container's /dev) doesn't apply here.
      - /dev:/dev/host
      # ELEGOO touchscreen (ADS7846) input event device (mserve_display).
      # Real device nodes (not symlinks) live directly under /dev/input
      # itself, so this one doesn't have the dangling-symlink problem above
      # — a direct bind-mount at the same path works. Kept separate from the
      # /dev/host mount above (rather than switching mserve_display to read
      # /dev/host/input/eventN) since /proc/bus/input/devices' own handler
      # names assume a plain /dev/input/eventN path.
      - /dev/input:/dev/input
    working_dir: /ws
    devices:
      # GPIO header UART (pins 14/15) on Pi 5 — see ws/src/mserve_drivechain/README.md.
      # Not USB, always present on this board — no enumeration instability
      # and no unplug risk, a plain devices: entry is fine (and unlike the
      # peripherals above, we *want* a hard failure if this is ever missing,
      # since drivechain can't function at all without it).
      - /dev/ttyAMA0:/dev/ttyAMA0
      # ELEGOO 3.5" SPI TFT framebuffer (mserve_display). SPI/GPIO-attached,
      # fixed to this Pi — no USB-style re-enumeration or unplug risk (see
      # the touch input device's own comment above for why that one's
      # handled differently, as a directory bind-mount instead of here).
      - /dev/fb0:/dev/fb0
    # The three directory bind-mounts above (volumes:) only make the device
    # files VISIBLE in the container's filesystem — they do NOT grant cgroup
    # device access, which is Docker's separate mechanism for actual
    # open()/read() permission. Confirmed the hard way for /dev/input:
    # opening /dev/input/eventN inside the container failed with EPERM
    # ("Operation not permitted"), not EACCES — that's the cgroup device
    # whitelist blocking it, unrelated to Unix file permissions/groups (root
    # inside the container already bypasses those). `devices:` entries get
    # this grant automatically; a directory volume bind-mount does not, so
    # it has to be added explicitly per device major, wildcarded on minor
    # since that's the part that shifts: 13 = input event devices, 81 =
    # video4linux (USB webcam), 188 = USB-serial converters (RPLIDAR's
    # CP2102N adapter).
    device_cgroup_rules:
      - 'c 13:* rmw'
      - 'c 81:* rmw'
      - 'c 188:* rmw'
    group_add:
      - dialout
      - video
      # "input" (for /dev/input/event*) isn't a predefined group name in
      # this base image — numeric gid, matching this host's `getent group
      # input`. If that ever changes on a different Pi, this needs updating
      # too (a name would auto-resolve; a number won't).
      - "996"
    command:
      - bash
      - -lc
      - |
        source /opt/ros/jazzy/setup.bash
        echo "[mserve] base ROS container started"
        echo "[mserve] ROS_DOMAIN_ID=$${ROS_DOMAIN_ID}"
        while true; do
          echo "[mserve] heartbeat $(date --iso-8601=seconds)"
          sleep "$${MSERVE_HEARTBEAT_SEC:-10}"
        done
    ports:
      - "${MSERVE_ROSBRIDGE_PORT:-9090}:9090"
      - "${MSERVE_HTTP_PORT:-8080}:8080"
      - "${MSERVE_FOXGLOVE_PORT:-8765}:8765"
    restart: unless-stopped
