services:
  robot-mserve:
    build:
      context: .
      dockerfile: Dockerfile
    image: mserve-robot:jazzy
    container_name: mserve-robot-mserve
    env_file:
      - .env
    environment:
      ROS_DOMAIN_ID: "${MSERVE_ROS_DOMAIN_ID:-52}"
      RCUTILS_LOGGING_SEVERITY: "${MSERVE_LOG_LEVEL:-INFO}"
    labels:
      logging: promtail
      robot: mserve
    volumes:
      - ./ws:/ws
      - ./web:/web
      # mserve_slam.launch.py sets slam_toolbox's cwd to
      # os.path.expanduser('~/mServe-STACK/map') unconditionally (native and
      # Docker alike) so save_map/serialize_map resolve a bare name with no
      # path typing — see map/README.md. Container's $HOME is /root, not
      # /home/ecm, so that path only exists here via this mount.
      - ./map:/root/mServe-STACK/map
      # ELEGOO touchscreen (ADS7846) input event device (mserve_display).
      # Bind-mounted (not a `devices:` entry) because unlike the USB camera/
      # lidar there is no stable udev by-id path for this — the
      # /dev/input/eventN NUMBER itself is what's unstable (has shifted
      # before), and `devices:` resolves a fixed major:minor once at
      # container-create time with no live tracking (see the camera/lidar
      # comment below). A live bind-mount of the whole directory lets
      # mserve_display's runtime /proc/bus/input/devices lookup (inside the
      # container) always see whatever eventN currently exists, including a
      # renumbering that happens after the container is already running.
      # Scoped to /dev/input only, not the full host /dev — doesn't touch
      # /dev/shm (rejected for the full-/dev approach below, for that DDS
      # shared-memory reason), so it's a much smaller blast radius.
      - /dev/input:/dev/input
    working_dir: /ws
    devices:
      # GPIO header UART (pins 14/15) on Pi 5 — see ws/src/mserve_drivechain/README.md.
      # Not USB — no enumeration instability, a plain devices: entry is fine.
      - /dev/ttyAMA0:/dev/ttyAMA0
      # USB webcam (mserve_camera) / RPLIDAR C1 (mserve_lidar). Host side is
      # the udev by-id stable path, not a raw /dev/videoN or /dev/ttyUSBN —
      # confirmed on this Pi that plain indices renumber on their own (the
      # webcam has been at video0, video1, *and* video2 across container
      # restarts in one session; a USB bus reset separately turned the
      # lidar's /dev/ttyUSB0 into /dev/ttyUSB1). Container-internal path
      # stays fixed (/dev/video1, /dev/ttyUSB0) regardless of host-side
      # churn, matching mserve_params.yaml's device params.
      #
      # `devices:` resolves the by-id symlink to a major:minor ONCE, at
      # container-CREATE time — it does not track the symlink live. If the
      # physical device gets reassigned a new major:minor after that
      # (another USB reset, a reboot) while this container is still
      # running, the mapped node goes stale (ENXIO on open). Tried bind-
      # mounting the whole host /dev instead so it'd always resolve fresh —
      # rejected: it shadows Docker's own /dev/shm tmpfs with a read-only
      # view, which would break DDS's shared-memory transport. Mitigation
      # instead: run_stack.sh always `--force-recreate`s this container, so
      # the snapshot is refreshed on every run even though it's still a
      # snapshot, not a live view.
      - /dev/v4l/by-id/usb-Ingenic_Semiconductor_CO.__LTD._HD_Web_Camera_Ucamera001-video-index0:/dev/video1
      - /dev/serial/by-id/usb-Silicon_Labs_CP2102N_USB_to_UART_Bridge_Controller_d656b5b6075ef01187795a401045c30f-if00-port0:/dev/ttyUSB0
      # ELEGOO 3.5" SPI TFT framebuffer (mserve_display). SPI/GPIO-attached,
      # fixed to this Pi — no USB-style re-enumeration risk (see the touch
      # input device's own comment above for why that one's handled
      # differently, as a directory bind-mount instead of here).
      - /dev/fb0:/dev/fb0
    # /dev/input's bind-mount (above, under volumes:) only makes the event
    # device files VISIBLE in the container's filesystem — it does NOT
    # grant cgroup device access, which is Docker's separate mechanism for
    # actual open()/read() permission. Confirmed the hard way: opening
    # /dev/input/eventN inside the container failed with EPERM ("Operation
    # not permitted"), not EACCES — that's the cgroup device whitelist
    # blocking it, unrelated to Unix file permissions/groups (root inside
    # the container already bypasses those). `devices:` entries get this
    # grant automatically; a directory volume bind-mount does not, so it
    # has to be added explicitly. Major 13 = Linux input event devices
    # (`c 13:* rmw` — wildcarded on minor, since that's the part that
    # shifts).
    device_cgroup_rules:
      - 'c 13:* rmw'
    group_add:
      - dialout
      - video
      # "input" (for /dev/input/event*) isn't a predefined group name in
      # this base image — numeric gid, matching this host's `getent group
      # input`. If that ever changes on a different Pi, this needs updating
      # too (a name would auto-resolve; a number won't).
      - "996"
    command:
      - bash
      - -lc
      - |
        source /opt/ros/jazzy/setup.bash
        echo "[mserve] base ROS container started"
        echo "[mserve] ROS_DOMAIN_ID=$${ROS_DOMAIN_ID}"
        while true; do
          echo "[mserve] heartbeat $(date --iso-8601=seconds)"
          sleep "$${MSERVE_HEARTBEAT_SEC:-10}"
        done
    ports:
      - "${MSERVE_ROSBRIDGE_PORT:-9090}:9090"
      - "${MSERVE_HTTP_PORT:-8080}:8080"
      - "${MSERVE_FOXGLOVE_PORT:-8765}:8765"
    restart: unless-stopped
