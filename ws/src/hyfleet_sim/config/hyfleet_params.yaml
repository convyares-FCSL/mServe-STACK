# HyFleet compression stack parameters — sim / test configuration.
# Node names match the launch file (hyfleet_sim.launch.py).
#
# Telemetry layout (CompressorTelemetry):
#   pt_bar[16]         — pressure transducers (bar)
#   tt_celsius[12]     — temperature transducers (°C)
#   vfd_speed_rpm[2]   — VFD shaft speed (rpm)
#   vfd_state[2]       — VFD_OFFLINE / VFD_IDLE / VFD_RUNNING
#   sv[n]              — solenoid valve open/closed (bool)
#
# Command interface (BoosterCmd.srv per booster instance):
#   START_VFD(1)   speed_rpm
#   STOP_VFD(2)
#   SET_PCSV(3)    enable, cpm
#   CONTROL_SV(4)  sv_index, enable

# ---------------------------------------------------------------------------
# Simulator
# ---------------------------------------------------------------------------

compressor_sim:
  ros__parameters:
    compressor:
      interstage_sv_index: 4          # sv index used for interstage coupling in SYNC mode

# ---------------------------------------------------------------------------
# Low booster  —  HBU1 (interstage stage)
#   inlet  : storage bank header     pt_bar[0]
#   outlet : interstage tank         pt_bar[7]
#   VFD    : vfd_speed_rpm[0]
#   inlet SV  : sv[0]
#   HPU SV    : sv[1]
# ---------------------------------------------------------------------------

low_booster:
  ros__parameters:

    # --- Telemetry index mapping ---
    vfd_index: 0
    inlet_pt_index: 0
    outlet_pt_index: 7
    inlet_sv_index: 0
    hpu_sv_index: 1

    # Hydraulic / coolant PTs — unmapped in sim (always 0 bar, below threshold)
    hyd_primer_pt_index: 3
    hyd_a_pt_index: 4
    hyd_b_pt_index: 5
    coolant_pt_index: 6

    # Temperature sensors — not modelled in sim; explicit to suppress default-config warnings
    inlet_tt_index_1: 0
    inlet_tt_index_2: 1
    outlet_tt_index_1: 2
    outlet_tt_index_2: 3
    outlet_tt_index_3: 4
    ps_lhs_index: 0
    ps_rhs_index: 1

    # --- Pressure limits (bar) ---
    min_pressure_bar: 35.0            # minimum accepted goal target
    max_pressure_bar: 500.0           # maximum accepted goal target
    safe_pressure: 20.0               # inlet below this → refuse to start
    target_deadband: 0.5              # ±bar around target counted as "at pressure"

    # --- Temperature limits (°C) ---
    min_temp_inlet: 0.0
    max_temp_inlet: 50.0
    min_temp_outlet: 0.0
    max_temp_outlet: 190.0

    # --- VFD timing (ms, short values for faster sim test cycles) ---
    vfd_delay_ms: 200                 # wait after START_VFD before checking speed
    vfd_stabilization_ms: 100         # wait after VFD at speed before opening HPU SV
    ramp_timeout_ms: 10000            # max time to reach target speed
    stop_timeout_ms: 5000             # max time to confirm VFD stopped
    stop_threshold: 25.0              # rpm — counts as stopped below this
    ramp_tolerance: 50.0              # rpm — counts as at speed within this band
    stabilization_samples: 2          # inlet stability window (samples at telemetry rate)
    stability_tolerance: 0.1          # bar — max variation across window to count as stable
    stability_timeout_ms: 5000        # ms — max wait for inlet to stabilise

    # --- Hydraulic pressure guard (bar / ms) ---
    hyd_pressure_threshold_bar: 10.0  # sim always 0 bar so check passes immediately
    hyd_timeout_ms: 3000              # max wait for hyd lines to de-pressurise

    # --- HOLD band: re-engage PCSV when outlet droops below this (bar) ---
    reenable_pressure_bar: 230.0      # absolute re-enable threshold (not an offset)

    # --- InletGuard starvation thresholds (bar) ---
    inlet_starve_bar: 35.0            # pause/abort compression if inlet drops below this
    inlet_resume_bar: 50.0            # resume compression once inlet recovers above this

# ---------------------------------------------------------------------------
# High booster  —  HBU2 (vehicle fill stage)
#   inlet  : interstage tank         pt_bar[1]
#   outlet : vehicle fill header     pt_bar[2]
#   VFD    : vfd_speed_rpm[1]
#   inlet SV  : sv[2]
#   HPU SV    : sv[3]
# ---------------------------------------------------------------------------

high_booster:
  ros__parameters:

    # --- Telemetry index mapping ---
    vfd_index: 1
    inlet_pt_index: 1
    outlet_pt_index: 2
    inlet_sv_index: 2
    hpu_sv_index: 3

    # Hydraulic / coolant PTs
    hyd_primer_pt_index: 8
    hyd_a_pt_index: 9
    hyd_b_pt_index: 10
    coolant_pt_index: 11

    # Temperature sensors — not modelled in sim
    inlet_tt_index_1: 0
    inlet_tt_index_2: 1
    outlet_tt_index_1: 2
    outlet_tt_index_2: 3
    outlet_tt_index_3: 4
    ps_lhs_index: 0
    ps_rhs_index: 1

    # --- Pressure limits (bar) ---
    min_pressure_bar: 35.0
    max_pressure_bar: 900.0
    safe_pressure: 20.0
    target_deadband: 0.5

    # --- Temperature limits (°C) ---
    min_temp_inlet: 0.0
    max_temp_inlet: 50.0
    min_temp_outlet: 0.0
    max_temp_outlet: 190.0

    # --- VFD timing (ms) ---
    vfd_delay_ms: 200
    vfd_stabilization_ms: 100
    ramp_timeout_ms: 10000
    stop_timeout_ms: 5000
    stop_threshold: 25.0
    ramp_tolerance: 50.0
    stabilization_samples: 2
    stability_tolerance: 0.1
    stability_timeout_ms: 5000

    # --- Hydraulic pressure guard ---
    hyd_pressure_threshold_bar: 10.0
    hyd_timeout_ms: 3000

    # --- HOLD band: re-engage PCSV when outlet droops below this (bar) ---
    reenable_pressure_bar: 820.0      # ~80 bar below 900 bar vehicle target

    # --- InletGuard starvation thresholds (bar) ---
    inlet_starve_bar: 175.0           # pause if interstage drops below starvation floor
    inlet_resume_bar: 200.0           # resume once interstage recovers above start threshold

# ---------------------------------------------------------------------------
# Coordinator  —  hyfleet_compression
# ---------------------------------------------------------------------------

hyfleet_compression:
  ros__parameters:

    # --- Telemetry index mapping ---
    inlet_pt_index: 0                 # storage bank header  (= low booster inlet)
    interstage_pt_index: 7            # interstage tank      (= low booster outlet)
    outlet_pt_index: 2                # vehicle fill header  (= high booster outlet)
    interstage_sv_index: 4            # SV connecting interstage tank to high booster inlet

    # --- Pressure limits (bar) ---
    min_pressure_bar: 35.0
    max_pressure_bar: 900.0

    # --- Compressor defaults ---
    default_speed_rpm: 1500.0         # rpm — sent to both boosters
    performance_cpm: 16.0             # strokes/min in PERFORMANCE mode
    eco_cpm: 8.0                      # strokes/min in ECO mode

    # --- SYNC mode thresholds (bar) ---
    interstage_target_bar: 280.0      # low booster holds interstage at this pressure
    interstage_start_threshold_bar: 200.0  # open interstage SV and start high booster at this
    interstage_starvation_bar: 175.0  # high booster pauses if interstage drops below this

    # --- SYNC overall timeout ---
    sync_overall_timeout_ms: 3600000  # ms — 1 hour failsafe
