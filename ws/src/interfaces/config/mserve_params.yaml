# mServe shared parameter defaults.
# Nested keys use dot notation: e.g. limits.max_linear_speed
# QoS and topic names default to sensible values; override here for your chassis.

mserve_base:
  ros__parameters:
    limits:
      max_linear_speed: 0.8        # m/s  — robot-level safety cap
      max_angular_speed: 1.2       # rad/s — robot-level safety cap
    geometry:
      wheel_separation: 0.305      # m — track width between wheel centers, measured 2026-07-19
      wheel_radius: 0.05035        # m — 100.7mm diameter, measured 2026-07-19 (was 0.08, ~59% off — real speed/odometry were both wrong)
      gear_ratio: 1.0              # motor revs per wheel rev
    motor_ids:
      left: 2                      # mserve_drivechain hardware.motor_ids mapping
      right: 1
    drive:
      cmd_vel_timeout_ms: 500      # send a zero drive command if no /cmd_vel within this window
    feedback_rate: 10.0            # Hz — drive loop tick rate
    odometry:
      # Gyro (mserve_sensehat's IMU) replaces wheel-differential-derived yaw
      # rate in UpdateOdometry when available — wheel slip during turns was
      # the traced root cause of real ~30deg heading drift over one mapped
      # SLAM loop with wheel-only odometry (docs/TODO.md). Falls back to
      # wheel-derived yaw if the IMU is unavailable/stale.
      use_imu_for_yaw: true
      imu_max_age_ms: 500
    topic_names:
      cmd_vel: /cmd_vel            # standard ROS topic — Nav2 and joy publish here
      cmd_vel_safe: /mserve/cmd_vel_safe
      imu: /mserve_sensehat/imu
    qos:
      commands:
        reliability: reliable
        durability: volatile
        depth: 1

mserve_drivechain:
  ros__parameters:
    drive:
      backend: hardware            # "sim" (default) or "hardware"
      command_timeout_ms: 500      # zero all motors if no motor_commands received within this window
    hardware:
      uart_device: /dev/ttyAMA0
      motor_count: 2
      motor_ids: [2, 1]
      motor_names: [left, right]
      motor_signs: [1, -1]          # +1 = normal; -1 = physically reversed (flip direction)
      motor_enabled: [true, true]
      motor_accel: 5               # DDSM115 'act' ramp byte (0-255); 0 = instant, applies to all motors
    feedback_rate: 20.0            # Hz

mserve_camera:
  ros__parameters:
    # By-id stable path, not a raw /dev/videoN — this Pi's USB video
    # enumeration isn't stable (the webcam has shown up as video0, video1,
    # *and* video2 across reboots/container restarts in one session).
    # docker-compose.yml bind-mounts the whole host /dev live at /dev/host
    # (not a `devices:` entry, and not /dev/v4l directly — see its comment
    # for why the by-id symlink needs the full tree present to resolve), so
    # this path stays valid across a re-enumeration that happens after the
    # container is already running — no container recreate needed.
    device: /dev/host/v4l/by-id/usb-Ingenic_Semiconductor_CO.__LTD._HD_Web_Camera_Ucamera001-video-index0
    width: 640                    # YUYV @ 640x480 hits 30fps on this USB webcam;
    height: 480                   # higher resolutions drop to 5-10fps in YUYV (MJPG would be needed for full-rate 1080p)
    frame_id: camera_link_optical # REP-103 optical frame — see mserve_camera.xacro/mserve_depth_camera.xacro
    flip_180: true                # physical mount is upside down on this chassis — confirmed 2026-07-19
    capture_rate_hz: 15.0          # ceiling on capture_loop()'s rate — see mserve_camera/camera_node.hpp

mserve_lidar:
  ros__parameters:
    # By-id stable path, not a raw /dev/ttyUSBN — a USB bus reset turned
    # this into /dev/ttyUSB1 mid-session once already. Same live /dev/host
    # bind-mount as the camera above — see its comment. Also means a
    # briefly-unplugged lidar no longer prevents the whole container
    # (drivechain/base/camera/display, none of which depend on it) from
    # starting — mserve_lidar itself just fails to configure and
    # lifecycle_manager's bringup tree continues past it.
    device: /dev/host/serial/by-id/usb-Silicon_Labs_CP2102N_USB_to_UART_Bridge_Controller_d656b5b6075ef01187795a401045c30f-if00-port0
    baudrate: 460800              # fixed for RPLIDAR C1 — not configurable on the device side
    frame_id: lidar_link          # see mserve_lidar.xacro
    scan_mode: ""                 # empty = device's typical/default scan mode
    inverted: false
    scan_rate_hz: 15.0             # ceiling on capture_loop()'s rate — see mserve_lidar/lidar_node.hpp

mserve_display:
  ros__parameters:
    # Empty = auto-detect the ELEGOO panel's framebuffer by driver name
    # (fb_ili9486) instead of assuming /dev/fb0 — its numbering shifts when
    # other framebuffer-registering hardware (e.g. a Pi Sense HAT) is added.
    # See mserve_display::resolveFramebufferDevice / boot_splash.py's
    # matching lookup.
    fb_device: ""
    fb_flip_180: true
    touch:
      device_name_match: "ADS7846 Touchscreen"
      poll_rate_hz: 40.0
      tap_max_move: 200            # raw ABS units (0-4095 range) — NEEDS LIVE TUNING
      tap_min_hold_ms: 30
      tap_max_hold_ms: 800
    touch_calib:
      x_min: 530
      x_max: 3519
      y_min: 471
      y_max: 3619
      invert_x: false
      invert_y: true
      swap_xy: true
    eye_follow:
      max_angular_for_full_deflection: 1.2   # matches mserve_base's default max_angular_speed
      deadzone: 0.08
      smoothing: 0.7
    info_refresh_hz: 1.0
    status_publish_hz: 1.0
    lifecycle_poll_hz: 1.0
    ip_refresh_sec: 15.0
    topic_names:
      cmd_vel_safe: /mserve/cmd_vel_safe
      motor_feedback: /mserve_drivechain/motor_feedback
      drivechain_status: /mserve_drivechain/drive_status
      base_status: /mserve_base/base_status
    service_names:
      connect: /mserve_drivechain/connect
      drivechain_get_state: /mserve_drivechain/get_state
      base_get_state: /mserve_base/get_state

mserve_joystick:
  ros__parameters:
    # Selects one of joystick_params.yaml's controller_profiles entries —
    # this node reads that file's raw index map under
    # controller_profiles.<controller_profile> at startup. Swapping
    # controller hardware means adding a new profile there (see that file's
    # header comment) and changing this one line — button_actions below
    # doesn't need touching, since every profile uses the same semantic
    # names.
    controller_profile: pi_controller
    joy_topic: /joy
    drive:
      # No invert_linear/invert_angular by design — this node publishes the
      # standard REP-103 Twist convention with no per-source sign tweaking.
      # Any hardware-specific direction correction belongs in
      # mserve_drivechain's hardware.motor_signs instead (see that section),
      # the one place that already owns it, rather than duplicated/guessed
      # at in each cmd_vel source (joystick, future Nav2, teleop, ...).
      linear_axis: left_stick_y     # joystick_map name (see joystick_params.yaml) driving linear.x
      angular_axis: right_stick_x    # joystick_map name driving angular.z
      deadzone: 0.1                 # ignore stick deflection below this magnitude
    speed:
      initial: 0.4        # m/s at full stick deflection
      min: 0.1
      max: 0.8             # matches mserve_base limits.max_linear_speed default — see that section
      step: 0.1            # per increase_speed/decrease_speed button press
    angular:
      initial: 0.6         # rad/s at full stick deflection
      min: 0.1
      max: 1.2             # matches mserve_base limits.max_angular_speed default — see that section
      step: 0.2            # per increase_angular/decrease_angular button press
    status_publish_hz: 2.0  # ~/status (JoystickStatus: profile, speed/angular scale) — web/joystick.html
    # Semantic name (from the selected joystick_params.yaml controller
    # profile) -> action. Only entries present here are wired up;
    # buttons/axes with no action listed are read but otherwise ignored.
    # l1/r1/l2/r2 are the digital button indices (see joystick_params.yaml),
    # not the l2_trigger/r2_trigger analog axes — a plain button press/edge
    # is all "increase/decrease by one step" needs.
    button_actions:
      triangle: connect
      circle: display_info
      r1: increase_angular
      l1: decrease_angular
      r2: increase_speed
      l2: decrease_speed
    topic_names:
      cmd_vel: /cmd_vel
    service_names:
      connect: /mserve_drivechain/connect
      display_set_mode: /mserve_display/set_display_mode

mserve_sensehat:
  ros__parameters:
    imu_frame_id: sensehat_link   # not yet a real URDF frame
    imu_publish_hz: 20.0
    imu_settings_dir: /tmp/mserve_sensehat  # RTIMULib's own settings/calibration cache
    joystick_poll_hz: 20.0
    joystick_device_name_match: "Raspberry Pi Sense HAT Joystick"
    status_publish_hz: 5.0        # ~/status (SensehatStatus) — web/sensehat.html
    # Key (up/down/left/right/center) -> action. Same pattern as
    # mserve_joystick's button_actions — only entries listed here are wired
    # up. "connect" is currently the only supported action.
    button_actions:
      center: connect
    topic_names:
      imu: /mserve_sensehat/imu
      status: /mserve_sensehat/status
      drivechain_status: /mserve_drivechain/drive_status
    service_names:
      connect: /mserve_drivechain/connect
