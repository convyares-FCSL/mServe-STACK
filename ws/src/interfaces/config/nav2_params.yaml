# Nav2 params for mServe — first real integration (2026-07-19).
#
# Localization is AMCL + map_server against a static saved map, not
# slam_toolbox's own localization mode (switched 2026-07-19, same day as
# the first integration) — slam_toolbox's job is building maps
# (--slam-map), not keeping the live scan aligned to one during
# navigation. Two concrete problems drove the switch: (1) slam_toolbox's
# localization mode has no equivalent of AMCL's /initialpose — there's no
# quick click-to-correct when the robot is picked up/moved by hand and the
# belief pose drifts, only a clunky deserialize_map service call with a
# manually typed-in pose; (2) that's exactly the ergonomics AMCL was built
# for. map_server's yaml_filename below needs updating per-map, same as
# slam_params_local.yaml's map_file_name — regenerate with slam_toolbox's
# own save_map service (not serialize_map — that's the pose-graph format,
# this needs the plain .pgm+.yaml) whenever a new/updated map is saved.
#
# footprint (2026-07-19): switched from a circular robot_radius (0.28m,
# padded to the ~0.24m diagonal bounding radius of a 370x315mm chassis) to
# a rectangular polygon. The circle penalized every heading by the full
# diagonal even when driving straight through a doorway, where only the
# 315mm wheel-to-wheel width matters — with a real doorway measured at
# ~0.60-0.64m clear width (map/house_v2.pgm), the 0.56m-diameter circle
# left only ~4-8cm margin and the robot stalled at the threshold.
# Rectangle below is real measured dimensions (chassis: 370mm long, 315mm
# wide across the wheels; base_link origin sits at the wheel axis, 75mm
# from the back of the frame per chassis_joint_x in mserve_core.xacro) plus
# a 20mm pad on every edge for localization/control tolerance — not zero
# margin, but nowhere near the old circle's overhead. Revisit if
# mserve_description's own placeholder chassis_width/wheel_separation ever
# get corrected to match these measurements.
#
# Velocity caps (desired_linear_vel, rotate_to_heading_angular_vel) are set
# well under mserve_base's own hard safety clamp
# (mserve_params.yaml's mserve_base.limits: 0.8 m/s / 1.2 rad/s) — Nav2
# requesting speeds mserve_base would silently clamp anyway could confuse
# its own velocity-tracking assumptions, and this is a conservative first
# test after a real collision earlier in this project's history (see
# CLAUDE.md's Verification section). Raise once trusted on real hardware.

controller_server:
  ros__parameters:
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.2

    # Regulated Pure Pursuit — simpler/more predictable than DWB's dynamic
    # window sampling, matches this project's "every part hand-writable and
    # learnable" philosophy (CLAUDE.md) better than a heavier trajectory
    # scorer would for a first integration.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.35
      lookahead_dist: 0.5
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.8
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.6
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.5
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.15
      use_fixed_curvature_lookahead: false
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 1.0
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 2   # 3 -> 2 (2026-07-19): house is small, 3m rolling window was more than needed
      height: 2
      resolution: 0.05
      footprint: "[[0.315, 0.18], [0.315, -0.18], [-0.095, -0.18], [-0.095, 0.18]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.15   # 0.4 -> 0.1 -> 0.15 (2026-07-19): 0.4 blocked doorways; once the
        # footprint switched from a padded circle to the real 315mm-wide rectangle, the doorway
        # had enough margin (~120-140mm/side) to afford a gradient again — 0.1 had almost none,
        # so NavFn had no cost bias toward the centerline and paths hugged one wall arbitrarily.
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.315, 0.18], [0.315, -0.18], [-0.095, -0.18], [-0.095, 0.18]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.15   # 0.4 -> 0.1 -> 0.15 (2026-07-19): 0.4 blocked doorways; once the
        # footprint switched from a padded circle to the real 315mm-wide rectangle, the doorway
        # had enough margin (~120-140mm/side) to afford a gradient again — 0.1 had almost none,
        # so NavFn had no cost bias toward the centerline and paths hugged one wall arbitrarily.
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.3
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.6
    min_rotational_vel: 0.3
    rotational_acc_lim: 2.0

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # default_nav_to_pose_bt_xml/default_nav_through_poses_bt_xml
    # deliberately unset — falls back to nav2_bt_navigator's own compiled-in
    # default tree, not a custom one, for this first integration.

map_server:
  ros__parameters:
    yaml_filename: "/root/mServe-STACK/map/house_v2.yaml"
    topic_name: "map"
    frame_id: "map"

amcl:
  ros__parameters:
    # Confirmed on real hardware (2026-07-19): with autostart: true (below)
    # and no default pose, nav2_lifecycle_manager's bringup starts
    # immediately on launch, activates map_server/amcl/controller_server
    # fine, then hangs on planner_server — its global costmap needs a valid
    # map -> base_link transform to activate, and AMCL doesn't publish
    # map -> odom until it has *some* pose (set_initial_pose: false used
    # to mean "wait for a human to click 2D Pose Estimate in Foxglove").
    # nav2_lifecycle_manager's own bringup timeout (60s) then aborts the
    # whole bringup — including behavior_server/bt_navigator, never even
    # attempted — permanently, before the human doing the clicking ever
    # gets a chance to unblock it. A guessed default pose here is very
    # possibly *wrong* (the robot doesn't have a fixed dock/start spot),
    # but it removes the deadlock either way — AMCL's own particle filter
    # will correct itself once the robot moves and starts getting real
    # scan matches. Still worth a real Foxglove 2D Pose Estimate afterward
    # if the guess was off enough to matter, same as before.
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: scan
    map_topic: map
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    # Odometry noise model (alpha1-5) left at Nav2's own defaults —
    # untuned against this chassis's actual wheel slip characteristics,
    # revisit if AMCL's particle cloud looks too tight/loose in practice.
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    laser_model_type: "likelihood_field"
    laser_max_range: 12.0   # RPLIDAR C1's actual max range, not Nav2's 100.0 default
    laser_min_range: 0.1
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    update_min_a: 0.2
    update_min_d: 0.2
    resample_interval: 1
    transform_tolerance: 1.0
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    save_pose_rate: 0.5
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    do_beamskip: false
    tf_broadcast: true
    # set_initial_pose/initial_pose.* live near the top of this block, not
    # here — see that comment for why. (This used to be a second
    # set_initial_pose: false right here, silently overriding the one
    # above since YAML keeps the last value for a duplicate key — that's
    # why the default-pose fix didn't actually do anything the first time.)
    always_reset_initial_pose: false
    first_map_only: false
    pf_err: 0.05
    pf_z: 0.99
