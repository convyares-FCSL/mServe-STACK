# slam_toolbox params for mServe — copied from the vendored package's own
# ws/src/third_party/slam_toolbox/config/mapper_params_online_async.yaml and adjusted for
# this robot. Kept here (not edited in place in the vendored package, which
# is gitignored source) so it survives a `git clone` of a fresh slam_toolbox
# checkout and shows up in `git diff` like any other mserve config change.
#
# Changed from upstream defaults:
#   base_frame: base_footprint -> base_link  (matches mserve_base's actual
#     odom -> base_link TF broadcast; this robot has no separate footprint frame)
#   minimum_travel_distance / minimum_travel_heading: 0.5 -> 0.2 (m / rad,
#     ~11.5deg) — a new scan is only added to the map after the robot moves
#     past one of these since the last one; 0.5 (~29deg) felt sluggish for a
#     normal-sized house. Lower = finer-grained map updates but a larger pose
#     graph (more CPU) as more of the space gets mapped — tune further if
#     needed once you've mapped a full house-sized space and can feel the
#     tradeoff.
#
# See ws/src/launch/README.md for how this gets loaded.

slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping #localization

    # if you'd like to immediately start continuing a map at a given pose
    # or at the dock, but they are mutually exclusive, if pose is given
    # will use pose
    #map_file_name: test_steve
    # map_start_pose: [0.0, 0.0, 0.0]
    #map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02 #if 0 never publishes odometry
    map_update_interval: 5.0
    resolution: 0.05
    restamp_tf: false
    min_laser_range: 0.0 #for rastering images
    max_laser_range: 20.0 #for rastering images
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000 #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    check_min_dist_and_heading_precisely: false
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters - Correlation Parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Correlation Parameters - Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349
    # 0.349 (default, ±20deg) -> 0.6 (~±34deg): widened after a real
    # out-and-back loop through an open/feature-poor area (a corridor) left
    # the live scan ~30deg rotated relative to the built map. This is the
    # per-scan search window scan matching uses to pull odom's heading
    # estimate back toward the true one — once real drift exceeds it in a
    # single step, matching can't correct it and the error sticks. Not yet
    # re-verified against the same loop; if 30deg-class drift recurs, the
    # next lever is loop_search_space_dimension/loop_match_minimum_response_*
    # (pose-graph loop closure) rather than widening this further, since a
    # bigger per-scan search window costs more CPU and risks false matches.
    coarse_search_angle_offset: 0.6
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1
